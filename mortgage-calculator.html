<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Calculator</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      background: #f4f6f8;
      color: #1a1a1a;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .calculator {
      width: min(100%, 26rem);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgb(0 0 0 / 8%);
      padding: 1.75rem;
    }

    h1 {
      margin: 0 0 1.25rem;
      font-size: 1.375rem;
      font-weight: 600;
    }

    label {
      display: block;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      margin-top: 0.375rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .input-wrap:focus-within {
      border-color: #2563eb;
      outline: 2px solid rgb(37 99 235 / 20%);
    }

    .prefix,
    .suffix {
      padding: 0 0.75rem;
      color: #666;
      background: #f9fafb;
      font-size: 0.875rem;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 0;
      padding: 0.625rem 0.75rem;
      font: inherit;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .results {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
    }

    .results[hidden] {
      display: none;
    }

    .payment {
      font-size: 2rem;
      font-weight: 700;
      color: #2563eb;
      line-height: 1.2;
    }

    .payment-label {
      margin: 0 0 0.25rem;
      font-size: 0.875rem;
      color: #666;
    }

    dl {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1rem;
      margin: 1rem 0 0;
      font-size: 0.875rem;
    }

    dt {
      color: #666;
    }

    dd {
      margin: 0;
      font-weight: 600;
      text-align: right;
    }

    .error {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 0.875rem;
    }

    .error[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <main class="calculator">
    <h1>Mortgage Calculator</h1>

    <form id="form" novalidate>
      <label>
        Loan amount
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="principal" name="principal" min="1" step="1000" value="300000" required>
        </div>
      </label>

      <label>
        Annual interest rate
        <div class="input-wrap">
          <input type="number" id="rate" name="rate" min="0" max="100" step="0.01" value="6.5" required>
          <span class="suffix">%</span>
        </div>
      </label>

      <label>
        Loan term
        <div class="input-wrap">
          <input type="number" id="years" name="years" min="1" max="50" step="1" value="30" required>
          <span class="suffix">years</span>
        </div>
      </label>

      <button type="submit">Calculate</button>
    </form>

    <p class="error" id="error" hidden></p>

    <section class="results" id="results" hidden aria-live="polite">
      <p class="payment-label">Estimated monthly payment</p>
      <p class="payment" id="monthly"></p>

      <dl>
        <dt>Total paid over life of loan</dt>
        <dd id="total-paid"></dd>
        <dt>Total interest</dt>
        <dd id="total-interest"></dd>
      </dl>
    </section>
  </main>

  <script>
    const form = document.getElementById('form');
    const results = document.getElementById('results');
    const errorEl = document.getElementById('error');

    const currency = new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: 'USD',
      maximumFractionDigits: 0,
    });

    function calculatePayment(principal, annualRate, years) {
      const months = years * 12;
      const monthlyRate = annualRate / 100 / 12;

      if (monthlyRate === 0) {
        return principal / months;
      }

      const factor = Math.pow(1 + monthlyRate, months);
      return (principal * monthlyRate * factor) / (factor - 1);
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.hidden = false;
      results.hidden = true;
    }

    function clearError() {
      errorEl.hidden = true;
      errorEl.textContent = '';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      clearError();

      const principal = Number(document.getElementById('principal').value);
      const rate = Number(document.getElementById('rate').value);
      const years = Number(document.getElementById('years').value);

      if (!Number.isFinite(principal) || principal <= 0) {
        showError('Enter a valid loan amount greater than zero.');
        return;
      }

      if (!Number.isFinite(rate) || rate < 0) {
        showError('Enter a valid interest rate.');
        return;
      }

      if (!Number.isFinite(years) || years <= 0) {
        showError('Enter a valid loan term in years.');
        return;
      }

      const monthly = calculatePayment(principal, rate, years);
      const totalPaid = monthly * years * 12;
      const totalInterest = totalPaid - principal;

      document.getElementById('monthly').textContent = currency.format(monthly);
      document.getElementById('total-paid').textContent = currency.format(totalPaid);
      document.getElementById('total-interest').textContent = currency.format(totalInterest);
      results.hidden = false;
    });

    form.requestSubmit();
  </script>
</body>
</html>
